<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Bible Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Bible Markdown Generator</h1>

    <div class="section">
      <label for="translation-select">Translation:</label>
      <select id="translation-select" disabled>
        <option value="">Loading translations...</option>
      </select>
      <button id="fetch-btn">Fetch Translations</button>
    </div>

    <div class="section">
      <label for="format-select">Output Format:</label>
      <select id="format-select">
        <option value="single">Single File</option>
        <option value="book">Per Book (01_Genesis.md)</option>
        <option value="chapter">Per Chapter (01_Genesis/01_Genesis_01.md)</option>
        <option value="verse">Per Verse (01_Genesis/01/01_Genesis_01_01.md)</option>
      </select>
    </div>

    <button id="download-btn" disabled>Download Bible</button>

    <div class="progress-section" id="progress-section" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text">0%</div>
    </div>

    <div class="result-section" id="result-section" style="display: none;">
      <h3>Result</h3>
      <div id="result-content"></div>
      <button id="save-btn">Save to Folder</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
